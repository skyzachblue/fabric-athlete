<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Fabric Athlete</title>
        <link rel="stylesheet" href="static/style.css">
    </head>
    <body>
        <header>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="user.html">User</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
            <div class="logo-wrapper">
                <a href="index.html">
                    <img src="img/logo.png" alt="logo">
                </a>
            </div>
        </header>

        <main>
            <section>
                <article>
                    <div class="user-wrapper">
                        <h2> User Profile </h2>
                        <div class="settings-menu-wrapper">
                            <ul>
                                <li><a href="#theme">Theme Settings</li>
                                <li><a href="#billing">Billing Options</li>
                                <li><a href="#info">Account Information</li>
                            </ul>
                        </div>
                        <div class="settings-wrapper" id="theme">
                            <h3> Theme Settings </h3>
                            
                        </div>
                        <div class="billing-wrapper" id="billing">
                            <h3> Billing Options </h3>
                            <div class="input-group">
                                <input type="text" id="card-info" placeholder="**** **** **** ****">
                                <label for="card-info"> Card Information </label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="expiry" placeholder="MM/YYYY">
                                <label for="expiry"> Expiry Date </label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="cvc" placeholder="***">
                                <label for="cvc"> CVC </label>
                            </div>
                        </div>

                        <div class=info-wrapper id="info">
                            <h3> Account Information </h3>
                            <div class="input-group">
                                <input type="text" id="first-name">
                                <label for="first-name"> First Name </label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="last-name">
                                <label for="last-name"> Last Name </label>
                            </div>
                            <div class="input-group">
                                <input type="tel" id="contact-num">
                                <label for="contact-num"> Contact Number </label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="address">
                                <label for="address"> Address </label>
                            </div>
                            <div class="input-group">
                                <input type="email" id="email">
                                <label for="email"> Email Address </label>
                            </div>
                            <div class="input-group">
                                <input type="password" id="password">
                                <label for="password"> Password </label>
                            </div>
                    </div>
                </article>
            </section>
        </main>

        <footer>
            <div>
                <small>2026 Fabric Athletes. All rights reserved.</small>
            </div>
            <div>
                <small>Contact Us:</small>
                <small>Email: info@fabricathlete.com</small>
                <small>Tel. No: 123-456-7890</small>
            </div>
        </footer>
    </body>
</html>
